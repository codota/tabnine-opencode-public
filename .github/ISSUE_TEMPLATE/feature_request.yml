name: Feature request
description: Suggest an improvement or new capability for the Tabnine plugin for opencode
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please describe the problem you are trying to solve, not only the solution you have in mind.
  - type: checkboxes
    id: preflight
    attributes:
      label: Before you begin
      options:
        - label: I searched existing issues and this has not already been requested.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do, and what gets in the way today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like the Tabnine plugin for opencode to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you use today, or other approaches you have thought about.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that would help us understand the request.
    validations:
      required: false
